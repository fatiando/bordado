name: bordado
channels:
  - conda-forge
dependencies:
  - python==3.14
  - pip
  - make
  # Run
  - numpy
  - scipy
  # Build
  - python-build
  - twine
  # Test
  - pytest
  - pytest-cov
  - coverage
  - pandas
  - xarray
  # Documentation
  - sphinx==7.2.*
  - numpydoc==1.7.*
  - sphinx-book-theme==1.1.*
  - sphinx-copybutton==0.5.*
  - sphinx-design==0.5.*
  - jupyter-sphinx==0.5.*
  - matplotlib==3.10.*
  - pygmt==0.18.*
  - gmt==6.6.*
  # Style
  - ruff
  - zizmor
  - burocrata
